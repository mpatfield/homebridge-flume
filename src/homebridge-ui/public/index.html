<p class="text-center">
  <img
    src="https://github.com/mpatfield/homebridge-flume/blob/latest/img/banner.png?raw=true"
    alt="homebridge-flume"
    style="width: 60%;"
  />
</p>
<div id="support" class="text-center" style="display: none;">
  <p i18n="support" i18n_replace="github"></p>
</div>
<div id="pageIntro" class="text-center" style="display: none;">
  <p class="lead" i18n="thankYou"></p>
  <p i18n="needed" i18n_replace="flume"></p>
  </br><button type="button" class="btn btn-primary" id="introContinue" i18n="continue", i18n_replace="arrow"></button>
</div>

<script>

  const i18n_replacements = {
    arrow: '&rarr;',
    flume: '<a target="_blank" href="https://portal.flumetech.com/">Flume</a>',
    github: '<a target="_blank" href="https://github.com/mpatfield/homebridge-flume/">GitHub</a>'
  }

  const translateHtml = (strings) => {
    document.querySelectorAll('[i18n]').forEach(element => {

      let string = strings.config[element.getAttribute('i18n')]

      const token = element.getAttribute('i18n_replace')
      if (token) {
        string = string.replace('%s', i18n_replacements[token])
      }

      element.innerHTML = string
    })
  }

  const translateSchema = (strings, observer) => {

    let replaced = false

    const tags = ['span', 'label', 'legend', 'option', 'p']
    const elements = Array.from(
      window.parent.document.querySelectorAll(tags.join(','))
    ).sort((a, b) => {
      return tags.indexOf(a.tagName.toLowerCase()) - tags.indexOf(b.tagName.toLowerCase())
    })

    elements.forEach(element => {
      let newHtml = element.innerHTML

      newHtml = newHtml.replaceAll(
        /\$\{config\.(title|description|enumNames)\.([^\}]+)\}/g,
        (match, type, key) => {
          if (strings.config[type] && strings.config[type][key]) {
            return strings.config[type][key]
          }
          return match
        }
      )

      if (element.innerHTML !== newHtml) {
        element.innerHTML = newHtml
        replaced = true
      }
    })

    if (replaced) observer?.disconnect()
  }

  const showIntro = (strings) => {

    const introContinue = document.getElementById('introContinue')
    introContinue.addEventListener('click', async () => {
      showSettings(strings)
    })

    document.getElementById('pageIntro').style.display = 'block'

    homebridge.hideSpinner()
  }

  const showSettings = async (strings) => {
    homebridge.showSpinner()

    document.getElementById('pageIntro').style.display = 'none'        
    document.getElementById('support').style.display = 'block'

    const observer = new window.parent.MutationObserver(() => {
      translateSchema(strings, observer)
    })

    observer.observe(
      window.parent.document.body,
      { childList: true, subtree: true }
    )

    await homebridge.showSchemaForm()

    homebridge.hideSpinner()
  }

  (async () => {

    homebridge.showSpinner()

    try {

      const language = await homebridge.i18nCurrentLang()
      const strings = await homebridge.request('i18n', language)
      translateHtml(strings)

      const config = await homebridge.getPluginConfig()
      if (config.length) {
        await showSettings(strings)
      } else {
        config.push({ name: strings.brand })
        await homebridge.updatePluginConfig(config)
        showIntro(strings)
      }

    } catch (err) {
      homebridge.toast.error(err.message)
      homebridge.hideSpinner()
    }
  })()

</script>
